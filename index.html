<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>運航日報</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <h2>運航日報</h2>
        
        <div class="form-row">
            <div class="form-group flex-1">
                <label for="driver">運転手名</label>
                <input type="text" id="driver" list="driver-list" placeholder="入力">
                <datalist id="driver-list"></datalist>
            </div>
            
            <div class="form-group flex-1">
                <label for="car-number">車番選択</label>
                <input type="text" id="car-number" list="car-list" placeholder="入力">
                <datalist id="car-list"></datalist>
            </div>
        </div>

        <div class="form-group">
            <label for="start-km">開始メーター</label>
            <input type="number" id="start-km" placeholder="km（数字のみ入力）">
        </div>
        <div class="form-group">
            <label for="end-km">終了メーター</label>
            <input type="number" id="end-km" placeholder="km（数字のみ入力）">
        </div>

        <div class="form-row">
            <div class="form-group flex-1">
                <label for="company">会社名</label>
                <input type="text" id="company" list="company-list" placeholder="選択・新規入力">
                <datalist id="company-list"></datalist>
            </div>

            <div class="form-group flex-1">
                <label for="shop">店舗名</label>
                <input type="text" id="shop" list="shop-list" placeholder="選択・新規入力">
                <datalist id="shop-list"></datalist>
            </div>
        </div>

        <hr>
        <p style="text-align: center; font-size: 12px; color: #666; margin-bottom: 10px;">ボタンを押すと同時に自動保存されます</p>

        <div class="btn-grid">
            <button type="button" id="btn-co-departure" class="btn btn-purple">市場発</button>
            <button type="button" id="btn-co-arrival" class="btn btn-darkgreen">市場着</button>
        </div>
        
        <div class="btn-grid" style="margin-top: 10px;">
            <button type="button" id="btn-departure" class="btn btn-blue">到着</button>
            <button type="button" id="btn-arrival" class="btn btn-green">出発</button>
        </div>
        
        <button type="button" id="btn-print" class="btn btn-gray">日報を印刷・PDF化</button>
        
        <p id="status-message" class="status"></p>

        <div class="history-section">
            <h3>過去の日報履歴（全件スクロール）</h3>
            <div id="history-box">データを読み込み中...</div>
        </div>
    </div>

    <link rel="manifest" href="manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('PWA準備完了'))
                .catch((err) => console.error('PWAエラー:', err));
        }
    </script>
    <script src="app.js"></script>
</body>
</html>
