<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>運行管理日報システム</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="運行日報">
    
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('ServiceWorker登録成功'))
                .catch(err => console.error('ServiceWorker登録失敗', err));
        }
    </script>
</head>
<body>
    <div class="app-container">
        <h2>運行管理日報</h2>
        
        <div class="status" id="status-message">データを読み込み中...</div>

        <div class="form-row">
            <div class="form-group flex-1">
                <label>運転手名</label>
                <input type="text" id="driver" list="driver-list" placeholder="名前を選択または入力">
                <datalist id="driver-list"></datalist>
            </div>
            <div class="form-group flex-1">
                <label>車番</label>
                <input type="text" id="car-number" list="car-list" placeholder="車番を選択または入力">
                <datalist id="car-list"></datalist>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group flex-1">
                <label>会社名</label>
                <input type="text" id="company" list="company-list" placeholder="会社名を入力">
                <datalist id="company-list"></datalist>
            </div>
            <div class="form-group flex-1">
                <label>店舗名</label>
                <input type="text" id="shop" list="shop-list" placeholder="店舗名を入力">
                <datalist id="shop-list"></datalist>
            </div>
        </div>

        <hr>

        <div class="btn-grid">
            <button class="btn btn-purple" id="btn-co-departure">市場 発</button>
            <button class="btn btn-darkgreen" id="btn-co-arrival">市場 着</button>
        </div>

        <div class="btn-grid" style="margin-top: 15px;">
            <button class="btn btn-blue" id="btn-departure">到着</button>
            <button class="btn btn-green" id="btn-arrival">出発</button>
        </div>

        <button class="btn btn-gray" id="btn-print">日報を印刷・PDF化</button>

        <div class="history-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h3 style="margin: 0;">過去の日報履歴（全件スクロール）</h3>
                <button id="btn-clear-history" style="background-color: #dc3545; color: white; border: none; padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; cursor: pointer;">履歴クリア</button>
            </div>
            <div id="history-box"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
